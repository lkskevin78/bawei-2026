name: 自動更新颱風巴威路徑

on:
  schedule:
    # 氣象署每6小時發一次公報，這裡每30分鐘「嘗試」觸發一次
    # 目的不是要更頻繁更新資料，而是增加觸發次數，避免GitHub排程偶爾漏跳造成長時間空窗
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 執行更新腳本
        run: python3 scripts/update_typhoon.py

      - name: 提交並推送變更（若有）
        run: |
          if git diff --quiet -- typhoon-data.json; then
            echo "沒有變更，略過提交。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add typhoon-data.json
          git commit -m "auto: 更新颱風巴威路徑資料"
          git push
