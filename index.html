<title>颱風巴威路徑劇本示意</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#050D1A;--panel:#0A1A2E;--bord:#162B46;
  --text:#D2E7F8;--mute:#4A6C8C;
  --c1:#E53845;--c2:#F09A55;--c3:#48AA78;
  --c1l:#FF949C;--c2l:#FFD4A8;--c3l:#A0E5C8;
}
body{
  background:var(--deep);color:var(--text);
  font-family:'PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:16px 12px 28px;gap:12px;
}
.hdr{text-align:center}
.hdr h1{font-size:clamp(1rem,2.8vw,1.45rem);font-weight:700;
         letter-spacing:.05em;color:#BDD6F0}
.hdr p{margin-top:3px;font-size:.78rem;color:var(--mute);letter-spacing:.05em}
.tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.tab{
  padding:6px 16px;border-radius:4px;border:1px solid var(--bord);
  background:rgba(255,255,255,.03);color:var(--mute);cursor:pointer;
  font-family:inherit;font-size:.82rem;letter-spacing:.04em;
  transition:all .2s;user-select:none;
}
.tab:hover{border-color:#3A6A9A;color:var(--text)}
.tab.a1{border-color:var(--c1);color:var(--c1l);background:rgba(229,56,69,.12)}
.tab.a2{border-color:var(--c2);color:var(--c2l);background:rgba(240,154,85,.12)}
.tab.a3{border-color:var(--c3);color:var(--c3l);background:rgba(72,170,120,.12)}
.layout{display:flex;gap:12px;width:100%;max-width:980px;align-items:flex-start}
.map-wrap{
  flex:1;min-width:0;position:relative;border-radius:6px;
  overflow:hidden;border:1px solid var(--bord);
}
.map-wrap img{display:block;width:100%;height:auto}
.map-wrap canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
}
.side{width:192px;flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.card{
  background:var(--panel);border:1px solid var(--bord);
  border-radius:6px;padding:13px 14px;
}
.lbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
      color:var(--mute);margin-bottom:4px}
.val{font-size:.95rem;font-weight:700;color:var(--text);
      font-variant-numeric:tabular-nums}
.sub{font-size:.68rem;color:var(--mute);margin-top:2px;
      font-variant-numeric:tabular-nums}
.prog-wrap{height:3px;background:var(--bord);border-radius:2px;
            margin-top:8px;overflow:hidden}
.prog-bar{height:100%;width:0%;border-radius:2px;transition:width .08s linear}
.sc-title{font-size:.9rem;font-weight:700;margin-bottom:5px}
.sc-prob{font-size:.68rem;color:var(--mute);margin-bottom:7px;
          font-variant-numeric:tabular-nums}
.sc-desc{font-size:.75rem;line-height:1.65;color:#96B8D4}
.leg{font-size:.72rem;color:#6A8EA8;line-height:1.75}
.leg-row{display:flex;align-items:center;gap:6px}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.replay{
  width:100%;padding:7px;border:1px solid var(--bord);border-radius:4px;
  background:transparent;color:var(--mute);cursor:pointer;
  font-family:inherit;font-size:.78rem;letter-spacing:.05em;transition:all .2s;
}
.replay:hover{border-color:#3A6A9A;color:var(--text)}
.note{font-size:.68rem;color:var(--mute);text-align:center;letter-spacing:.03em}
@media(max-width:600px){
  .layout{flex-direction:column}
  .side{width:100%;flex-direction:row;flex-wrap:wrap}
  .card{flex:1;min-width:140px}
}
</style>

<script>
// ── 地圖座標系 ──────────────────────────────────────────────────────────────
// 與 matplotlib 相同範圍：108°E–158°E, 5°N–42°N
const L0=108,L1=158,A0=5,A1=42;

const mapbg = document.getElementById('mapbg');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function syncSize() {
  if (mapbg.naturalWidth) {
    canvas.width  = mapbg.naturalWidth;
    canvas.height = mapbg.naturalHeight;
  }
}
mapbg.onload = syncSize;
if (mapbg.complete) syncSize();

function xy(lon, lat) {
  return [
    (lon - L0) / (L1 - L0) * canvas.width,
    (1 - (lat - A0) / (A1 - A0)) * canvas.height,
  ];
}

// ── 劇本資料（由 typhoon-data.json 動態載入，供自動更新腳本改寫）───────────────
let SC = null, TY_DATA = null;

// ── 動畫 ─────────────────────────────────────────────────────────────────────
let curS=1, animT=0, rot=0, lastTS=null, rafId=null;
const DURATION=10000;

function lerp(a,b,t){return a+(b-a)*t;}
function getPos(wps,t){
  const n=wps.length-1, f=Math.min(t*n,n-0.001);
  const i=Math.floor(f), fr=f-i;
  const A=wps[i],B=wps[Math.min(i+1,n)];
  return {lon:lerp(A.lon,B.lon,fr),lat:lerp(A.lat,B.lat,fr),
           it:lerp(A.it,B.it,fr),date:A.date,
           lbl:fr<.3&&A.lbl?A.lbl:(fr>.75&&B.lbl?B.lbl:'')};
}
function iStats(v){return {ms:Math.round(15+v*45),hpa:Math.round(1015-v*120)};}

function drawGhostPaths(sc){
  [1,2,3].forEach(s=>{
    if(s===sc)return;
    const c=SC[s]; const wps=c.wps;
    ctx.beginPath();
    wps.forEach((wp,i)=>{
      const [x,y]=xy(wp.lon,wp.lat);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle=c.color+'28';
    ctx.lineWidth=Math.max(1,canvas.width/700*1.5);
    ctx.setLineDash([4,7]);ctx.stroke();ctx.setLineDash([]);
  });
}

function drawTrail(sc,t){
  const wps=SC[sc].wps; const color=SC[sc].color;
  const n=wps.length-1; const prog=t*n;
  const lw=Math.max(1.5,canvas.width/700*2.5);

  ctx.shadowColor=color; ctx.shadowBlur=canvas.width/100;
  ctx.beginPath();
  ctx.moveTo(...xy(wps[0].lon,wps[0].lat));
  for(let seg=0;seg<n;seg++){
    const sp=Math.min(Math.max(prog-seg,0),1);
    if(sp<=0)break;
    const A=wps[seg],B=wps[seg+1];
    ctx.lineTo(...xy(lerp(A.lon,B.lon,sp),lerp(A.lat,B.lat,sp)));
  }
  ctx.strokeStyle=color;ctx.lineWidth=lw;
  ctx.lineJoin='round';ctx.lineCap='round';
  ctx.setLineDash([]);ctx.stroke();
  ctx.shadowBlur=0;

  // 路徑點 & 標籤
  const shown=Math.floor(prog);
  for(let i=0;i<=shown&&i<wps.length;i++){
    const wp=wps[i];
    const [px,py]=xy(wp.lon,wp.lat);
    const r=Math.max(3,canvas.width/700*4);
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();

    if(wp.date){
      const fs=Math.max(9,canvas.width/700*11);
      ctx.font=`${fs}px system-ui`;
      ctx.fillStyle='rgba(200,220,240,.82)';
      ctx.textAlign='center';
      ctx.fillText(wp.date,px,py-r-4);
    }
    if(wp.lbl&&i<=shown){
      const fs=Math.max(8,canvas.width/700*10);
      ctx.font=`bold ${fs}px PingFang TC,system-ui`;
      ctx.fillStyle=SC[sc].light;
      ctx.textAlign='center';
      ctx.fillText(wp.lbl,px,py+r+14);
    }
  }
  ctx.textAlign='left';
}

function drawWindCircles(cx,cy,it,color){
  const pxPer = canvas.width/(L1-L0);
  const r7  = (2.2+it*0.9)*pxPer;
  const r10 = r7*0.42;
  [[r7,'30'],[r10,'55']].forEach(([r,a])=>{
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=color+a;ctx.lineWidth=1;
    ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
  });
}

function drawSpiral(cx,cy,radius,rotation,color){
  ctx.save();ctx.translate(cx,cy);
  ctx.shadowColor=color;ctx.shadowBlur=radius*1.2;
  for(let b=0;b<4;b++){
    const r=radius*(1-b*.18),al=.78-b*.16;
    ctx.beginPath();
    ctx.arc(0,0,r,rotation+b*.75,rotation+b*.75+Math.PI*1.55);
    ctx.strokeStyle=`rgba(255,255,255,${al})`;
    ctx.lineWidth=Math.max(1,2.5-b*.5);ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,radius*1.25,0,Math.PI*2);
  ctx.strokeStyle=color+'40';ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(0,0,Math.max(4,radius*.28),0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,Math.max(2,radius*.13),0,Math.PI*2);
  ctx.fillStyle='#06111E';ctx.fill();
  ctx.restore();
}

function frame(ts){
  if(!lastTS)lastTS=ts;
  const dt=ts-lastTS;lastTS=ts;
  animT=Math.min(animT+dt/DURATION,1);
  rot+=dt*.003;

  const sc=SC[curS];
  const pos=getPos(sc.wps,animT);
  const [ex,ey]=xy(pos.lon,pos.lat);
  const rad=Math.max(10,canvas.width/700*(12+pos.it*11));

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGhostPaths(curS);
  drawTrail(curS,animT);
  drawWindCircles(ex,ey,pos.it,sc.color);
  drawSpiral(ex,ey,rad,rot,sc.color);

  // 起點星號
  const [sx,sy]=xy(152.3,12.7);
  ctx.font=`bold ${Math.max(14,canvas.width/700*18)}px serif`;
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',sx,sy);ctx.textBaseline='alphabetic';ctx.textAlign='left';

  const st=iStats(pos.it);
  document.getElementById('cur-date').textContent=pos.date.replace('/',' / ');
  document.getElementById('prog-bar').style.width=(animT*100)+'%';
  document.getElementById('prog-bar').style.background=sc.color;
  document.getElementById('cur-ms').textContent=st.ms+' m/s';
  document.getElementById('cur-hpa').textContent=st.hpa+' hPa';

  if(animT<1){rafId=requestAnimationFrame(frame);}
  else{setTimeout(()=>{animT=0;lastTS=null;rafId=requestAnimationFrame(frame);},2000);}
}

function startScenario(s){
  if(rafId)cancelAnimationFrame(rafId);
  curS=s;animT=0;lastTS=null;rot=0;
  const sc=SC[s];
  document.querySelectorAll('.tab').forEach(t=>{
    t.className='tab'+(t.dataset.s==s?' '+sc.cls:'');
  });
  const nt=document.getElementById('sc-name');
  nt.textContent=sc.name;nt.style.color=sc.light;
  document.getElementById('sc-prob').textContent=sc.prob;
  document.getElementById('sc-desc').textContent=sc.desc;
  rafId=requestAnimationFrame(frame);
}

document.querySelectorAll('.tab').forEach(b=>
  b.addEventListener('click',()=>startScenario(+b.dataset.s)));
document.getElementById('replay-btn').addEventListener('click',()=>startScenario(curS));

// 等圖片與颱風路徑資料都載入完成再初始化
let imgReady=false, dataReady=false;
function tryInit(){
  if(!imgReady||!dataReady)return;
  syncSize();
  startScenario(TY_DATA.main||2);
}
if(mapbg.complete&&mapbg.naturalWidth){imgReady=true;}
mapbg.addEventListener('load',()=>{imgReady=true;tryInit();});
if(imgReady)tryInit();

fetch('typhoon-data.json').then(r=>r.json()).then(data=>{
  TY_DATA=data;
  SC={};
  [1,2,3].forEach(k=>{
    const s=data.scenarios[k];
    SC[k]={color:s.color,light:s.light,cls:s.cls,name:s.name,prob:s.prob,desc:s.desc,
           wps:data.observed.concat(s.forecast)};
  });
  const updEl=document.getElementById('data-updated');
  if(updEl)updEl.textContent='資料更新：'+data.updated+'（中央氣象署）';
  dataReady=true;
  tryInit();
}).catch(err=>console.error('載入颱風路徑資料失敗',err));
</script>
